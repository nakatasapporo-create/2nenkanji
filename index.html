<head>

    <style>
        /* 教科書体に近い「Klee One」と丸ゴシック風の「Kiwi Maru」を導入 */
        @import url('https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Kiwi+Maru:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Kiwi Maru', serif;
            background-color: #f0fdf4; /* 優しい緑ベース */
        }

        .kanji-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(75px, 1fr));
            gap: 12px;
            padding: 16px;
        }

        .kanji-card {
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            border: 2px solid #bbf7d0;
            border-radius: 16px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        /* 漢字カードのフォントを教科書体（Klee One）に指定 */
        .kanji-text {
            font-family: 'Klee One', serif;
            font-weight: 600;
        }

        .kanji-card:hover {
            transform: translateY(-4px) scale(1.05);
            border-color: #22c55e;
            box-shadow: 0 10px 15px -3px rgba(34, 197, 94, 0.2);
        }

        .modal-bg {
            background-color: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
        }

        /* 漢字表示用コンテナ */
        .kanji-canvas-container {
            position: relative;
            width: 280px;
            height: 280px;
            background: #ffffff;
            border: 4px solid #bbf7d0;
            border-radius: 24px;
            margin: 0 auto 16px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.05);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .grid-line-h, .grid-line-v {
            position: absolute;
            border: 1px dashed #cbd5e1;
            z-index: 0;
            pointer-events: none;
        }

        /* 下書き用SVGコンテナ */
        #svg-background-container {
            position: absolute;
            width: 240px;
            height: 240px;
            z-index: 1;
            opacity: 0.15; /* 非常に薄く下書きとして表示 */
            pointer-events: none;
        }

        /* アニメーション用SVGコンテナ */
        #svg-container {
            position: absolute;
            width: 240px;
            height: 240px;
            z-index: 2;
            pointer-events: none;
        }

        #svg-container svg, #svg-background-container svg {
            width: 100%;
            height: 100%;
        }

        /* ストローク描画の設定 */
        #svg-container path {
            stroke: #16a34a !important; /* アニメーションする緑の筆跡 */
            stroke-width: 5.5 !important;
            fill: none !important;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke-dashoffset 0.05s linear;
        }

        /* 下書き用SVGのパス設定 */
        #svg-background-container path {
            stroke: #475569 !important; /* 濃い目のグレー */
            stroke-width: 5.5 !important;
            fill: none !important;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* KanjiVGの画数数字用スタイル */
        #svg-container text {
            font-size: 8px !important;
            fill: #dc2626 !important; /* 赤い数字で見やすく表示 */
            font-family: sans-serif;
            font-weight: bold;
        }
    </style>
</head>

        let activeTab = 'p1';
        const container = document.getElementById('kanji-container');
        const modal = document.getElementById('modal');
        const svgBackgroundContainer = document.getElementById('svg-background-container');
        const svgContainer = document.getElementById('svg-container');
        const modalReadings = document.getElementById('modal-readings');
        const modalNumberBadge = document.getElementById('modal-number');
        const toggleNumCheckbox = document.getElementById('toggle-numbers');
        
        let currentKanji = null;
        let animationTimers = [];

        // 漢字初期化
        function init() {
            renderKanjiGrid();
        }

        // タブ切り替え処理
        function switchTab(tab) {
            activeTab = tab;
            ['p1', 'p2', 'p3', 'p4', 'all'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === tab) {
                    btn.className = "px-4 py-2 bg-emerald-500 text-white rounded-full font-bold shadow-md hover:bg-emerald-600 transition-colors";

                    btn.className = "px-4 py-2 bg-white text-emerald-600 rounded-full font-bold border-2 border-emerald-500 hover:bg-emerald-50 transition-colors";
                }
            });
            renderKanjiGrid();
        }

        // 漢字のカードを描画
        function renderKanjiGrid() {
            container.innerHTML = '';
            kanjiData.forEach((item) => {
                let show = false;
                if (activeTab === 'all') show = true;
                else if (activeTab === 'p1' && item.n >= 1 && item.n <= 40) show = true;
                else if (activeTab === 'p2' && item.n >= 41 && item.n <= 80) show = true;
                else if (activeTab === 'p3' && item.n >= 81 && item.n <= 120) show = true;
                else if (activeTab === 'p4' && item.n >= 121 && item.n <= 160) show = true;

                if (show) {
                    const card = document.createElement('div');
                    card.className = 'kanji-card';
                    card.innerHTML = `
                        <!-- 左上の通し番号 -->
                        <span class="absolute top-1 left-2 text-[10px] font-bold text-emerald-500">No.${item.n}</span>
                        <!-- 漢字本体 -->
                        <span class="kanji-text text-3xl text-slate-800 pt-3">${item.k}</span>
                    `;
                    card.onclick = () => openModal(item);
                    container.appendChild(card);
                }
            });
        }

        // モーダルを開いて書き順SVGを取得＆再生
        async function openModal(item) {
            currentKanji = item;
            modalReadings.textContent = item.r;
            modalNumberBadge.textContent = item.n;
            svgContainer.innerHTML = '<div class="text-sm text-slate-400 mt-28">よみこみ中...</div>';
            svgBackgroundContainer.innerHTML = '';
            
            modal.classList.remove('hidden');
            
            // Unicodeのコードポイントを生成
            const codePoint = item.k.charCodeAt(0).toString(16).padStart(5, '0');
            const svgUrl = `https://cdn.jsdelivr.net/gh/KanjiVG/kanjivg@master/kanji/${codePoint}.svg`;

            try {
                const response = await fetch(svgUrl);
                if (!response.ok) throw new Error("SVGが取得できませんでした");
                let svgText = await response.text();
                
                // アニメーション用と背景用に注入
                svgContainer.innerHTML = svgText;
                svgBackgroundContainer.innerHTML = svgText;
                
                [svgContainer, svgBackgroundContainer].forEach(container => {
                    const svgElement = container.querySelector('svg');
                    if (svgElement) {
                        svgElement.removeAttribute('width');
                        svgElement.removeAttribute('height');
                    }
                });

                // 下書き用SVG内のすべてのパスを表示状態にする
                const bgPaths = svgBackgroundContainer.querySelectorAll('path');
                bgPaths.forEach(path => {
                    path.style.strokeDashoffset = '0';
                    path.style.strokeDasharray = 'none';
                    path.style.opacity = '1';
                });

                // 下書き用SVGの画数数字は非表示
                const bgNumbers = svgBackgroundContainer.querySelector('g[id^="kvg:StrokeNumbers"]');
                if (bgNumbers) {
                    bgNumbers.style.display = 'none';
                }

                // 書き順アニメーション実行
                animateKanji();
            } catch (error) {
                console.error(error);
                svgContainer.innerHTML = '<div class="text-xs text-red-400 mt-28">書き順データを<br>よみこめませんでした</div>';
                svgBackgroundContainer.innerHTML = '';
            }

            playVoice();
        }

        function closeModal() {
            modal.classList.add('hidden');
            clearTimers();
            window.speechSynthesis.cancel();
        }

        function clearTimers() {
            animationTimers.forEach(timer => clearTimeout(timer));
            animationTimers = [];
        }

        // 1画ずつアニメーション
        function animateKanji() {
            clearTimers();
            
            const paths = svgContainer.querySelectorAll('path');
            if (!paths.length) return;

            // 初期化
            paths.forEach(path => {
                const length = path.getTotalLength();
                path.style.strokeDasharray = length;
                path.style.strokeDashoffset = length;
                path.style.opacity = '1';
            });

            // 書き順番号の表示切り替え
            toggleNumbers();

            let delay = 100;
            
            paths.forEach((path) => {
                const timer = setTimeout(() => {
                    path.style.transition = 'stroke-dashoffset 0.8s ease-in-out';
                    path.style.strokeDashoffset = '0';
                }, delay);
                
                animationTimers.push(timer);
                delay += 950; 
            });
        }

        function replayAnimation() {
            animateKanji();
        }

        // 番号の切り替え
        function toggleNumbers() {
            const numbersGroup = svgContainer.querySelector('g[id^="kvg:StrokeNumbers"]');
            if (numbersGroup) {
                if (toggleNumCheckbox.checked) {
                    numbersGroup.style.display = 'block';
                } else {
                    numbersGroup.style.display = 'none';
                }
            }
        }

        // 読み上げ
        function playVoice() {
            if (!currentKanji) return;
            window.speechSynthesis.cancel();
            
            let speechText = `${currentKanji.k}。`;
            const readings = currentKanji.r.split('、');
            if (readings.length > 0) {
                speechText += `読み方は、${readings.join('、または、')}、です。`;
            }

            const utterance = new SpeechSynthesisUtterance(speechText);
            utterance.lang = 'ja-JP';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        }

        modal.onclick = (e) => {
            if (e.target === modal) closeModal();
        };

        window.onload = init;
    </script>
</body>
</html>
